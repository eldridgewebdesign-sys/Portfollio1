<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Tab-Logo.png" type="image/png" />
  <title>Client Login — WebSharke</title>

  <!-- Same brand fonts as the WebSharke dashboard (beach theme) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --ink:#11364c;            /* deep navy — primary text */
      --ink-soft:#2c5468;       /* muted coastal blue — secondary text */
      --turq:#10b6cc;           /* turquoise accent */
      --card:rgba(208,238,241,.34);
      --card-bd:rgba(255,255,255,.5);
    }
    html{scroll-behavior:smooth}
    body{
      font-family:'Mulish',system-ui,sans-serif;color:var(--ink);
      min-height:100vh;position:relative;overflow-x:hidden;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
      background:#36a1b3;
    }

    /* ── Layered turquoise ocean waves (fixed, behind everything) ───────────── */
    .ocean{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .ocean svg{width:100%;height:100%;display:block}

    /* ── WebSharke logo, top-left (Main-Logo.png masked to navy) ────────────── */
    .ws-logo{
      position:fixed;top:18px;left:26px;z-index:20;display:block;
      width:200px;height:64px;background:var(--ink);
      -webkit-mask:url(Main-Logo.png) left center/contain no-repeat;
              mask:url(Main-Logo.png) left center/contain no-repeat;
      filter:drop-shadow(0 1px 2px rgba(4,30,40,.25));
      transition:transform .3s ease;
    }
    .ws-logo:hover{transform:translateY(-1px)}

    /* ── Page shell: card pinned to the left ───────────────────────────────── */
    .login-shell{
      min-height:100vh;display:flex;align-items:flex-start;justify-content:flex-start;
      padding:clamp(6rem,13vh,7.5rem) clamp(1.1rem,4vw,3rem) 3rem;
    }

    /* ── Translucent light-aqua login card ─────────────────────────────────── */
    .login-card{
      width:100%;max-width:340px;
      background:var(--card);border:1px solid var(--card-bd);border-radius:14px;
      padding:1.8rem 1.7rem 2rem;
      backdrop-filter:blur(11px) saturate(1.18);-webkit-backdrop-filter:blur(11px) saturate(1.18);
      box-shadow:0 20px 54px rgba(0,40,55,.2),inset 0 1px 0 rgba(255,255,255,.45);
    }

    .login-title{
      font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.9rem;
      color:#0e2f44;letter-spacing:.01em;margin-bottom:1.4rem;
    }

    .field{margin-bottom:1.4rem}
    .lbl{
      display:block;font-family:'Cormorant Garamond',serif;font-weight:600;
      font-size:1.2rem;color:var(--ink);margin-bottom:.35rem;
    }
    /* Underline-only inputs (transparent, single bottom rule) */
    .fi{
      width:100%;background:transparent;border:none;border-bottom:1.5px solid var(--ink);
      color:var(--ink);font-family:'Mulish',sans-serif;font-size:1rem;
      padding:.35rem .1rem;outline:none;border-radius:0;
    }
    .fi::placeholder{color:rgba(17,54,76,.45)}
    .fi:focus{border-bottom-color:var(--turq)}

    /* ── Navy Sign In button ───────────────────────────────────────────────── */
    .btn-signin{
      display:block;width:100%;cursor:pointer;border:none;margin-top:.4rem;
      font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.15rem;
      color:#eaf2ff;padding:.6rem 1.5rem;border-radius:9px;
      background:linear-gradient(160deg,#2d57b4,#1d3f8f);
      box-shadow:0 8px 20px rgba(18,40,90,.32),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .25s,filter .25s,box-shadow .25s;
    }
    .btn-signin:hover{transform:translateY(-1px);filter:brightness(1.06);box-shadow:0 12px 26px rgba(18,40,90,.4)}
    .btn-signin:focus-visible{outline:2px solid var(--turq);outline-offset:3px}
    .btn-signin[disabled]{opacity:.6;cursor:not-allowed;transform:none;filter:none}

    /* ── "No account?" + New Project ───────────────────────────────────────── */
    .new-here{margin-top:1.5rem;font-size:.95rem;color:var(--ink)}
    .btn-new{
      display:inline-block;margin-top:.55rem;cursor:pointer;text-decoration:none;
      font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.05rem;
      color:var(--ink);padding:.35rem 1rem;border-radius:8px;
      background:rgba(255,255,255,.22);border:1.5px solid var(--ink);
      transition:background .25s,transform .25s;
    }
    .btn-new:hover{background:rgba(255,255,255,.4);transform:translateY(-1px)}
    .btn-new:focus-visible{outline:2px solid var(--turq);outline-offset:3px}

    /* ── Login messages / errors ───────────────────────────────────────────── */
    .msg{min-height:1.2rem;margin-top:1.1rem;font-size:.92rem;line-height:1.5}
    .msg.error{color:#7c1d29;background:rgba(255,255,255,.44);
      border:1px solid rgba(150,40,52,.4);border-radius:9px;padding:.6rem .8rem}
    .msg.show{display:block}

    @media(max-width:560px){
      .login-shell{justify-content:center;padding:clamp(5rem,12vh,6.5rem) 1.1rem 2.5rem}
      .login-card{max-width:100%}
      .ws-logo{width:160px;height:52px;top:14px;left:16px}
    }
  </style>
</head>
<body>

  <!-- ── Layered turquoise ocean waves ──────────────────────────────────────── -->
  <div class="ocean" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <rect width="1440" height="900" fill="#39a4b6"/>
      <path d="M0 96 C240 58 480 134 720 96 C960 58 1200 134 1440 96 L1440 900 L0 900 Z" fill="#5ec3d1"/>
      <path d="M0 222 C240 184 480 260 720 222 C960 184 1200 260 1440 222 L1440 900 L0 900 Z" fill="#2f9aac"/>
      <path d="M0 348 C240 388 480 312 720 348 C960 388 1200 312 1440 348 L1440 900 L0 900 Z" fill="#6fcdd9"/>
      <path d="M0 474 C240 436 480 512 720 474 C960 436 1200 512 1440 474 L1440 900 L0 900 Z" fill="#37a2b4"/>
      <path d="M0 600 C240 640 480 564 720 600 C960 640 1200 564 1440 600 L1440 900 L0 900 Z" fill="#63c5d3"/>
      <path d="M0 726 C240 688 480 764 720 726 C960 688 1200 764 1440 726 L1440 900 L0 900 Z" fill="#2c92a4"/>
      <path d="M0 822 C240 856 480 792 720 822 C960 856 1200 792 1440 822 L1440 900 L0 900 Z" fill="#57bccb"/>
    </svg>
  </div>

  <!-- ── Brand logo, top-left → back to the landing page ────────────────────── -->
  <a class="ws-logo" href="index.html" aria-label="WebSharke — home"></a>

  <main class="login-shell">
    <div class="login-card">
      <h1 class="login-title">Please log in</h1>

      <div class="field">
        <label class="lbl" for="email">Email</label>
        <input id="email" class="fi" type="email" autocomplete="email" />
      </div>

      <div class="field">
        <label class="lbl" for="password">Password</label>
        <input id="password" class="fi" type="password" autocomplete="current-password" />
      </div>

      <button id="signin-btn" class="btn-signin">Sign In</button>

      <p class="new-here">No account? Create a project here</p>
      <a href="onboarding.html" class="btn-new">New Project</a>

      <p id="message" class="msg"></p>
    </div>
  </main>

  <!-- ── Supabase (shared client `db`) — same config every page uses ────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    // =================================================================
    // AUTHENTICATION LOGIC (login page only).
    //
    // Sign-in only. Account creation lives on the onboarding page.
    // The shared Supabase client `db` comes from supabase-config.js.
    // =================================================================

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const signinBtn = document.getElementById("signin-btn");
    const messageEl = document.getElementById("message");

    // ---- Helper: show a small message under the form. ----
    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = "msg" + (text ? " show " + (type || "") : "");
    }

    // ---- After login, the logged-in area lives on the dashboard. ----
    // replace() keeps the login page out of the browser's back history.
    function goToDashboard() {
      window.location.replace("dashboard.html");
    }

    // ---- SIGN IN — log in with an existing email + password. ----
    signinBtn.addEventListener("click", async () => {
      signinBtn.disabled = true;
      showMessage("Signing in…", "");

      const { error } = await db.auth.signInWithPassword({
        email: emailInput.value,
        password: passwordInput.value,
      });

      signinBtn.disabled = false;
      if (error) showMessage(error.message, "error");
      // On success, onAuthStateChange fires below and redirects to the dashboard.
    });

    // ---- ON PAGE LOAD — if already signed in, skip the form. ----
    (async () => {
      const { data } = await db.auth.getSession();
      if (data.session) goToDashboard();
    })();

    // ---- LISTEN for auth changes — redirect as soon as a session exists. ----
    db.auth.onAuthStateChange((event, session) => {
      if (session) goToDashboard();
    });
  </script>
</body>
</html>
