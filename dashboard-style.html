<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="Tab-Logo.png" type="image/png">
<title>Sales Dashboard — WebSharke Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ====================================================================
   Sales Dashboard — static visual mockup (non-functional).
   Faithful to the reference composition; only subtle depth was added:
   layered gradients, a soft glow behind the chart, glass on the sidebar,
   gentle glow/shadow on the white strokes, and blurred circular accents.
   No JavaScript, no real charts — purely a presentation sample.
   ==================================================================== */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Mulish',system-ui,sans-serif;
  background:#0a1124;color:#eaf0fb;
  overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}

/* ── STAGE — full viewport canvas with the layered gradient backdrop ───────── */
.stage{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:
    radial-gradient(135% 95% at 10% 6%,  rgba(48,92,182,.50), transparent 52%),
    radial-gradient(130% 120% at 94% 102%, rgba(92,56,156,.55), transparent 55%),
    linear-gradient(140deg,#0a1230 0%,#0c1538 36%,#13163f 66%,#211a4c 100%);
}

/* ── BACKGROUND DEPTH LAYERS (all decorative, never interactive) ───────────── */
.layer{position:absolute;pointer-events:none}

/* bright blue lens glow, upper-left */
.glow-tl{top:-150px;left:-120px;width:520px;height:460px;border-radius:50%;
  background:radial-gradient(closest-side,rgba(62,116,232,.50),transparent 70%);
  filter:blur(22px)}
/* deep purple glow, lower-right */
.glow-br{right:-170px;bottom:-180px;width:680px;height:600px;border-radius:50%;
  background:radial-gradient(closest-side,rgba(116,62,184,.52),transparent 72%);
  filter:blur(34px)}
/* soft curved purple bands sweeping the lower-right corner */
.band{right:-260px;bottom:-260px;width:760px;height:760px;border-radius:50%;
  background:radial-gradient(closest-side,transparent 58%,rgba(120,78,196,.28) 63%,transparent 70%);
  filter:blur(6px)}
.band.b2{right:-340px;bottom:-300px;width:900px;height:900px;
  background:radial-gradient(closest-side,transparent 60%,rgba(96,70,180,.22) 64%,transparent 72%)}

/* faint large rings */
.ring{border-radius:50%}
.ring-tr{top:-170px;right:-110px;width:430px;height:430px;
  border:1px solid rgba(150,180,255,.12);
  box-shadow:inset 0 0 90px rgba(120,160,255,.05)}
.ring-bl{bottom:-160px;left:-130px;width:380px;height:380px;
  border:1px solid rgba(150,180,255,.08)}

/* dotted accents (top-right + bottom-right), softly faded at the edges */
.dots{background-image:radial-gradient(rgba(184,202,255,.40) 1.1px,transparent 1.3px);
  background-size:13px 13px}
.dots-tr{top:34px;right:48px;width:250px;height:150px;opacity:.55;
  -webkit-mask:radial-gradient(closest-side,#000 35%,transparent 100%);
          mask:radial-gradient(closest-side,#000 35%,transparent 100%)}
.dots-br{right:60px;bottom:66px;width:230px;height:140px;opacity:.45;
  -webkit-mask:radial-gradient(closest-side,#000 35%,transparent 100%);
          mask:radial-gradient(closest-side,#000 35%,transparent 100%)}

/* tiny bright spark near the top of the sidebar (matches the reference flare) */
.spark{top:46px;left:120px;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(closest-side,rgba(150,190,255,.55),transparent 70%);
  filter:blur(10px)}

/* ── SOFT GLOW BEHIND THE CHART (adds depth without changing composition) ──── */
.chart-glow{position:absolute;left:50.5%;top:50.5%;transform:translate(-50%,-50%);
  width:780px;height:640px;z-index:1;pointer-events:none;
  background:radial-gradient(closest-side,rgba(74,124,214,.20),transparent 72%);
  filter:blur(12px)}

/* ── LEFT SIDEBAR — glassy strip carrying the dotted texture, DB mark, icons ── */
.sidebar{
  position:absolute;top:0;left:0;width:96px;height:100%;z-index:4;
  display:flex;flex-direction:column;align-items:center;padding:26px 0;
  background:
    radial-gradient(rgba(172,196,255,.16) 1px,transparent 1.4px) 0 0/14px 14px,
    linear-gradient(180deg,rgba(24,34,74,.62),rgba(13,19,48,.46));
  border-right:1px solid rgba(150,180,255,.13);
  box-shadow:inset -1px 0 0 rgba(255,255,255,.05),2px 0 26px rgba(0,0,0,.26);
  -webkit-backdrop-filter:blur(7px) saturate(125%);
          backdrop-filter:blur(7px) saturate(125%);
}
.db{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:600;
  letter-spacing:.14em;color:#eef3fd;line-height:1;
  text-shadow:0 1px 10px rgba(120,160,255,.35)}
.db span{display:inline-block;padding:0 2px 7px;
  border-bottom:1.5px solid rgba(224,233,253,.85)}
.ico-col{display:flex;flex-direction:column;align-items:center;gap:30px;margin-top:40px}
.ico{width:30px;height:30px;display:block;color:rgba(233,239,251,.92);
  filter:drop-shadow(0 1px 4px rgba(20,40,90,.55))}

/* ── CHART SVG — axes, the four hand-drawn graphs, labels and arrows ───────────
   Kept in one coordinate space so every element stays locked to the cross. ─── */
.chart{position:absolute;inset:0;z-index:2;width:100%;height:100%}
.axis{stroke:#fff;stroke-width:3.5;stroke-linecap:round}
.graph{fill:none;stroke:#fff;stroke-width:9;stroke-linecap:round;stroke-linejoin:round}
.q-label{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:500;
  fill:#dde4f3;letter-spacing:.04em}
.caption{font-family:'Cormorant Garamond',serif;font-size:31px;font-weight:500;
  fill:#e7edfb;letter-spacing:.13em}

/* ── RESPONSIVE — desktop accuracy first; degrade gently on small screens ───── */
@media(max-width:680px){
  .sidebar{width:66px;padding:18px 0}
  .db{font-size:1.2rem}
  .ico{width:24px;height:24px}
  .ico-col{gap:24px;margin-top:30px}
}
@media(prefers-reduced-motion:no-preference){
  /* page is fully static — nothing animates */
}
</style>
</head>
<body>
<div class="stage">

  <!-- background depth -->
  <div class="layer glow-tl"></div>
  <div class="layer glow-br"></div>
  <div class="layer band"></div>
  <div class="layer band b2"></div>
  <div class="layer ring ring-tr"></div>
  <div class="layer ring ring-bl"></div>
  <div class="layer dots dots-tr"></div>
  <div class="layer dots dots-br"></div>
  <div class="layer spark"></div>

  <!-- glow behind the chart -->
  <div class="chart-glow"></div>

  <!-- left sidebar -->
  <aside class="sidebar">
    <div class="db"><span>DB</span></div>
    <div class="ico-col">
      <!-- analytics / bar chart -->
      <svg class="ico" viewBox="0 0 32 32" aria-hidden="true" fill="currentColor">
        <rect x="4"  y="18" width="4" height="9"  rx="1"/>
        <rect x="11" y="14" width="4" height="13" rx="1"/>
        <rect x="18" y="20" width="4" height="7"  rx="1"/>
        <rect x="25" y="11" width="4" height="16" rx="1"/>
        <circle cx="6"  cy="12" r="1.5"/>
        <circle cx="13" cy="8"  r="1.5"/>
        <circle cx="20" cy="13" r="1.5"/>
        <circle cx="27" cy="6"  r="1.5"/>
      </svg>
      <!-- users -->
      <svg class="ico" viewBox="0 0 32 32" aria-hidden="true" fill="currentColor">
        <circle cx="11" cy="11" r="4.2"/>
        <path d="M3,26 C3,20 7,17 11,17 C15,17 19,20 19,26 Z"/>
        <circle cx="21.5" cy="13" r="4.7"/>
        <path d="M12.5,28 C12.5,21.5 17,18.4 21.5,18.4 C26,18.4 30.5,21.5 30.5,28 Z"/>
      </svg>
      <!-- notepad + pencil -->
      <svg class="ico" viewBox="0 0 32 32" aria-hidden="true"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="5" width="15" height="22" rx="2.4"/>
        <rect x="10.5" y="3" width="6" height="4" rx="1.2" fill="currentColor" stroke="none"/>
        <line x1="9.5" y1="12" x2="17.5" y2="12"/>
        <line x1="9.5" y1="16" x2="17.5" y2="16"/>
        <line x1="9.5" y1="20" x2="14.5" y2="20"/>
        <path d="M21,21.5 L26.6,15.9 L29,18.3 L23.4,23.9 L20.4,24.9 Z" fill="currentColor" stroke="none"/>
      </svg>
    </div>
  </aside>

  <!-- chart: axes, graphs, labels, arrows -->
  <svg class="chart" viewBox="0 0 1366 768" preserveAspectRatio="xMidYMid meet" aria-label="Sales (2025) quadrant chart" role="img">
    <defs>
      <!-- soft blue glow that lifts the white strokes off the page -->
      <filter id="lineGlow" x="-12%" y="-12%" width="124%" height="124%">
        <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#8cb4ff" flood-opacity="0.55"/>
      </filter>
      <filter id="axisGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#9cc0ff" flood-opacity="0.40"/>
      </filter>
      <!-- subtle shadow + sheen for the navigation arrows -->
      <filter id="arrowShadow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#05070f" flood-opacity="0.45"/>
      </filter>
      <linearGradient id="arrowFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0"   stop-color="#a4aaba"/>
        <stop offset="1"   stop-color="#767b8c"/>
      </linearGradient>
    </defs>

    <!-- axes (the white cross) -->
    <g filter="url(#axisGlow)">
      <line class="axis" x1="690" y1="44"  x2="690"  y2="716"/>
      <line class="axis" x1="210" y1="388" x2="1262" y2="388"/>
    </g>

    <!-- four hand-drawn sales graphs -->
    <g class="graph" filter="url(#lineGlow)">
      <!-- Q1 (top-left) — overall rising with a mid notch -->
      <path d="M250,322 C312,302 372,240 415,182 C428,162 442,222 450,262 C508,214 582,150 650,98"/>
      <!-- Q2 (top-right) — mountain range -->
      <path d="M722,300 C772,286 820,240 858,176 C878,196 894,210 908,214 C934,176 956,134 975,104 C1004,150 1032,228 1052,250 C1066,238 1078,222 1088,212 C1100,238 1108,272 1116,290 C1126,262 1135,232 1142,214 C1172,228 1206,250 1236,260"/>
      <!-- Q4 (bottom-left) — rising zigzag -->
      <path d="M262,650 C292,628 318,592 335,560 C346,580 356,592 364,600 C400,556 426,524 452,500 C462,512 470,516 476,520 C516,492 556,466 586,442"/>
      <!-- Q3 (bottom-right) — descending staircase -->
      <path d="M712,442 C724,456 732,464 742,470 C756,470 768,468 780,468 C790,480 796,492 804,502 C820,502 838,500 850,500 C860,516 864,530 872,542 C888,546 902,548 912,548 C924,566 932,582 942,592 C960,596 976,598 988,600 C1000,616 1010,632 1020,644 C1028,650 1034,654 1042,658"/>
    </g>

    <!-- quadrant labels (hug the centre, as in the reference) -->
    <text class="q-label" x="672" y="379" text-anchor="end">Q1</text>
    <text class="q-label" x="709" y="379" text-anchor="start">Q2</text>
    <text class="q-label" x="672" y="411" text-anchor="end">Q4</text>
    <text class="q-label" x="709" y="411" text-anchor="start">Q3</text>

    <!-- bottom caption -->
    <text class="caption" x="690" y="745" text-anchor="middle">Sales(2025)</text>

    <!-- navigation arrows -->
    <g fill="url(#arrowFill)" filter="url(#arrowShadow)">
      <path d="M150,388 L204,360 L204,416 Z"/>
      <path d="M1316,388 L1262,360 L1262,416 Z"/>
    </g>
  </svg>

</div>
</body>
</html>
