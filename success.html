<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/Tab-Logo.png" type="image/png" />
  <title>Payment Successful — WebSharke</title>
  <meta name="robots" content="noindex" />

  <!-- Auto-redirect fallback if JavaScript is disabled -->
  <meta http-equiv="refresh" content="3;url=/dashboard" />

  <style>
    /* Brand fonts — vendored locally in /fonts, no CDN (see docs/performance-log.md → google-fonts-cdn). */
    @font-face{font-family:'Cormorant Garamond';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/cormorantgaramond-600.woff2) format('woff2')}
    @font-face{font-family:'Mulish';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/mulish-400.woff2) format('woff2')}
    @font-face{font-family:'Mulish';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/mulish-600.woff2) format('woff2')}
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --ink:#11364c;            /* deep navy — primary text */
      --ink-soft:#2c5468;       /* muted coastal blue — secondary text */
      --turq:#10b6cc;           /* turquoise accent */
      --turq-deep:#15707f;      /* deeper teal — links */
      --card:rgba(208,238,241,.34);
      --card-bd:rgba(255,255,255,.5);
    }
    body{
      font-family:'Mulish',system-ui,sans-serif;color:var(--ink);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:1.5rem;position:relative;overflow-x:hidden;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;background:#36a1b3;
    }

    /* ── Layered turquoise ocean waves (fixed, behind everything) ───────────── */
    .ocean{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .ocean svg{width:100%;height:100%;display:block}

    /* ── WebSharke logo, top-left (images/Main-Logo.png masked to navy) ──────── */
    .ws-logo{
      position:fixed;top:18px;left:26px;z-index:20;display:block;
      width:136px;height:76px;background:var(--ink);
      -webkit-mask:url(images/Main-Logo.png) left center/contain no-repeat;
              mask:url(images/Main-Logo.png) left center/contain no-repeat;
      filter:drop-shadow(0 1px 2px rgba(4,30,40,.25));transition:transform .3s ease;
    }
    .ws-logo:hover{transform:translateY(-1px)}

    /* ── Translucent light-aqua result card (matches the login card) ────────── */
    .card{
      max-width:440px;width:100%;text-align:center;
      padding:clamp(2.2rem,5vw,3rem) clamp(1.6rem,4vw,2.4rem);
      background:var(--card);border:1px solid var(--card-bd);border-radius:16px;
      backdrop-filter:blur(11px) saturate(1.18);-webkit-backdrop-filter:blur(11px) saturate(1.18);
      box-shadow:0 20px 54px rgba(0,40,55,.22),inset 0 1px 0 rgba(255,255,255,.45);
    }
    .icon{
      width:74px;height:74px;margin:0 auto 1.5rem;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      background:rgba(16,182,204,.16);border:1px solid rgba(16,182,204,.5);
      color:var(--turq-deep);font-size:2.3rem;line-height:1;
    }
    h1{
      font-family:'Cormorant Garamond',serif;font-weight:600;
      font-size:clamp(1.7rem,4vw,2.1rem);margin-bottom:.7rem;color:#0e2f44;letter-spacing:.01em;
    }
    p{color:var(--ink-soft);font-size:1.02rem;line-height:1.6;margin:0 auto;max-width:34ch}
    .dots{margin-top:1.5rem;font-size:.9rem;color:var(--ink-soft);letter-spacing:.02em}
    .dots a{color:var(--turq-deep);text-decoration:none;font-weight:600;border-bottom:1px solid rgba(21,112,127,.5)}
    .dots a:hover{color:#0a566a;border-bottom-color:#0a566a}
    .dots a:focus-visible{outline:2px solid var(--turq);outline-offset:3px;border-radius:3px}

    @media(max-width:560px){ .ws-logo{width:114px;height:64px;top:14px;left:16px} }
  </style>
</head>
<body>

  <!-- ── Layered turquoise ocean waves ──────────────────────────────────────── -->
  <div class="ocean" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <rect width="1440" height="900" fill="#39a4b6"/>
      <path d="M0 96 C240 58 480 134 720 96 C960 58 1200 134 1440 96 L1440 900 L0 900 Z" fill="#5ec3d1"/>
      <path d="M0 222 C240 184 480 260 720 222 C960 184 1200 260 1440 222 L1440 900 L0 900 Z" fill="#2f9aac"/>
      <path d="M0 348 C240 388 480 312 720 348 C960 388 1200 312 1440 348 L1440 900 L0 900 Z" fill="#6fcdd9"/>
      <path d="M0 474 C240 436 480 512 720 474 C960 436 1200 512 1440 474 L1440 900 L0 900 Z" fill="#37a2b4"/>
      <path d="M0 600 C240 640 480 564 720 600 C960 640 1200 564 1440 600 L1440 900 L0 900 Z" fill="#63c5d3"/>
      <path d="M0 726 C240 688 480 764 720 726 C960 688 1200 764 1440 726 L1440 900 L0 900 Z" fill="#2c92a4"/>
      <path d="M0 822 C240 856 480 792 720 822 C960 856 1200 792 1440 822 L1440 900 L0 900 Z" fill="#57bccb"/>
    </svg>
  </div>

  <!-- ── Brand logo, top-left → back to the landing page ────────────────────── -->
  <a class="ws-logo" href="/" aria-label="WebSharke — home"></a>

  <main class="card" role="status">
    <div class="icon" aria-hidden="true">&#10003;</div>
    <h1>Payment successful!</h1>
    <p>Your plan is now active. You&rsquo;ll be redirected to your dashboard in a few seconds.</p>
    <div class="dots">Redirecting&hellip; or <a href="/dashboard">go now</a>.</div>
  </main>

  <script>
    // Auto-redirect to the dashboard after 3 seconds.
    setTimeout(function () {
      window.location.href = "/dashboard";
    }, 3000);
  </script>
</body>
</html>
