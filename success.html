<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/Tab-Logo.png" type="image/png" />
  <title>Payment Successful — Eldridge Web Design</title>

  <!-- Auto-redirect fallback if JavaScript is disabled -->
  <meta http-equiv="refresh" content="3;url=/dashboard" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{ --navy:#0e1b2a; --teal:#2dd4bf; --t:#eaf2f7; --tm:#9fb3c2; }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:1.5rem; background:var(--navy); color:var(--t);
      font-family:'Space Grotesk',system-ui,-apple-system,"Segoe UI",sans-serif; line-height:1.6;
    }
    .card{
      max-width:440px; width:100%; text-align:center; padding:3rem 2.2rem;
      background:rgba(255,255,255,.03); border:1px solid rgba(45,212,191,.32);
      border-radius:12px; box-shadow:0 16px 44px rgba(0,0,0,.5);
    }
    .icon{
      width:72px; height:72px; margin:0 auto 1.6rem; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      background:rgba(45,212,191,.12); border:1px solid rgba(45,212,191,.45);
      color:var(--teal); font-size:2.2rem; line-height:1;
    }
    h1{font-family:'Abril Fatface',serif; font-weight:400; font-size:1.9rem; margin:0 0 .8rem; color:var(--teal)}
    p{color:var(--tm); font-size:1rem; margin:0 auto; max-width:34ch}
    .dots{margin-top:1.6rem; font-size:.85rem; color:var(--tm); letter-spacing:.04em}
    a{color:var(--teal); text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">&#10003;</div>
    <h1>Payment successful!</h1>
    <p>Your plan is now active. You&rsquo;ll be redirected to your dashboard in a few seconds.</p>
    <div class="dots">Redirecting&hellip; or <a href="/dashboard">go now</a>.</div>
  </main>

  <script>
    // Auto-redirect to the dashboard after 3 seconds.
    setTimeout(function () {
      window.location.href = "/dashboard";
    }, 3000);
  </script>
</body>
</html>
